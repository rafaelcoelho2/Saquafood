<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saquá Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 pb-10">
    <div class="bg-blue-600 text-white p-6 shadow-md text-center">
        <h1 class="text-3xl font-bold italic">🏄‍♂️ SAQUÁ FOOD</h1>
    </div>

    <div id="form-container" class="p-4 max-w-md mx-auto mt-4 bg-white rounded-xl shadow-sm border border-blue-100 transition-all">
        <h2 id="titulo-form" class="font-bold text-blue-800 mb-2 text-center">Cadastrar Lanche</h2>
        <input type="hidden" id="edit-id">
        <div class="space-y-3">
            <input type="text" id="nome" placeholder="Nome" class="w-full p-2 border rounded-lg">
            <input type="number" id="preco" placeholder="Preço" class="w-full p-2 border rounded-lg">
            <input type="text" id="imagem" placeholder="Link da Foto" class="w-full p-2 border rounded-lg text-sm">
            <button id="btn-salvar" onclick="salvar()" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg">Salvar</button>
            <button id="btn-cancelar" onclick="cancelarEdicao()" class="hidden w-full bg-gray-400 text-white font-bold py-2 rounded-lg">Cancelar</button>
        </div>
    </div>

    <div class="p-4 max-w-md mx-auto space-y-4" id="itens"></div>

    <script>
        let editandoId = null;

        function carregar() {
            fetch('/cardapio').then(res => res.json()).then(data => {
                const div = document.getElementById('itens');
                div.innerHTML = "";
                data.forEach(item => {
                    div.innerHTML += `
                        <div class="bg-white rounded-xl shadow-md overflow-hidden flex border border-gray-100">
                            <img src="${item.imagem}" class="w-24 h-24 object-cover">
                            <div class="p-3 flex-1">
                                <h3 class="font-bold text-slate-800">${item.nome}</h3>
                                <p class="text-green-600 font-bold">R$ ${item.preco.toFixed(2)}</p>
                                <div class="flex gap-4 mt-2">
                                    <button onclick='prepararEdicao(${JSON.stringify(item)})' class="text-blue-500 text-xs font-bold uppercase">Editar</button>
                                    <button onclick="remover(${item.id})" class="text-red-400 text-xs font-bold uppercase">Sair</button>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        function prepararEdicao(item) {
            editandoId = item.id;
            document.getElementById('nome').value = item.nome;
            document.getElementById('preco').value = item.preco;
            document.getElementById('imagem').value = item.imagem;
            
            document.getElementById('titulo-form').innerText = "Editando Item";
            document.getElementById('form-container').classList.replace('border-blue-100', 'border-orange-400');
            document.getElementById('btn-salvar').classList.replace('bg-blue-600', 'bg-orange-500');
            document.getElementById('btn-cancelar').classList.remove('hidden');
        }

        function cancelarEdicao() {
            editandoId = null;
            document.getElementById('nome').value = "";
            document.getElementById('preco').value = "";
            document.getElementById('imagem').value = "";
            document.getElementById('titulo-form').innerText = "Cadastrar Lanche";
            document.getElementById('form-container').classList.replace('border-orange-400', 'border-blue-100');
            document.getElementById('btn-salvar').classList.replace('bg-orange-500', 'bg-blue-600');
            document.getElementById('btn-cancelar').classList.add('hidden');
        }

        function salvar() {
            const n = document.getElementById('nome').value;
            const p = document.getElementById('preco').value;
            const i = document.getElementById('imagem').value;
            
            let url = editandoId 
                ? `/editar_prod?id=${editandoId}&nome=${n}&preco=${p}&imagem=${i}`
                : `/adicionar?nome=${n}&preco=${p}&imagem=${i}`;

            fetch(url).then(() => {
                cancelarEdicao();
                carregar();
            });
        }

        function remover(id) {
            if(confirm("Excluir?")) fetch('/deletar/'+id).then(() => carregar());
        }

        carregar();
    </script>
</body>
</html>

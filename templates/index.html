<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saquafood - Cardápio</title>
    <style>
        :root { --red: #e50914; --green: #25d366; --gray: #f4f4f4; }
        body { font-family: sans-serif; background: var(--gray); margin: 0; padding-bottom: 220px; }
        .header { background: var(--red); color: white; text-align: center; padding: 15px; font-weight: bold; font-size: 1.2rem; }
        .card { background: white; margin: 10px; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-qtd { background: var(--red); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 20px; border-top: 3px solid var(--red); display: none; box-sizing: border-box; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-finalizar { background: var(--green); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">SAQUAFOOD</div>
    
    <div id="lista-produtos" style="padding: 10px;">
        {% for p in produtos %}
        <div class="card">
            <div>
                <div style="font-weight: bold;">{{ p.nome }}</div>
                <div style="color: #28a745; font-weight: bold;">R$ {{ "%.2f"|format(p.preco) }}</div>
                <div style="margin-top: 10px; display: flex; align-items: center; gap: 15px;">
                    <button class="btn-qtd" onclick="mudar('{{p.id}}', -1, '{{p.nome}}', {{p.preco}})">-</button>
                    <b id="qtd-{{p.id}}">0</b>
                    <button class="btn-qtd" onclick="mudar('{{p.id}}', 1, '{{p.nome}}', {{p.preco}})">+</button>
                </div>
            </div>
            {% if p.imagem_url %}<img src="{{p.imagem_url}}" style="width: 60px; height: 60px; border-radius: 8px;">{% endif %}
        </div>
        {% endfor %}
    </div>

    <div class="footer" id="cart">
        <input type="text" id="nome_cliente" placeholder="Digite seu nome" required>
        <select id="forma_pagamento">
            <option value="Pix">Pix</option>
            <option value="Dinheiro">Dinheiro</option>
            <option value="Cartão">Cartão</option>
        </select>
        <button class="btn-finalizar" onclick="enviarPedido()">Pedir pelo WhatsApp • R$ <span id="total-val">0.00</span></button>
    </div>

    <script>
        let carrinho = {};
        function mudar(id, d, nome, preco) {
            if(!carrinho[id]) carrinho[id] = {nome, preco, qtd: 0};
            carrinho[id].qtd += d;
            if(carrinho[id].qtd <= 0) delete carrinho[id];
            
            document.getElementById('qtd-'+id).innerText = carrinho[id] ? carrinho[id].qtd : 0;
            
            let total = 0;
            for(let k in carrinho) total += carrinho[k].qtd * carrinho[k].preco;
            
            document.getElementById('cart').style.display = total > 0 ? 'block' : 'none';
            document.getElementById('total-val').innerText = total.toFixed(2);
        }

        async function enviarPedido() {
            const nome = document.getElementById('nome_cliente').value;
            const pgto = document.getElementById('forma_pagamento').value;
            if(!nome) return alert("Por favor, digite seu nome!");

            let resumo = "";
            let msgZap = "*NOVO PEDIDO SAQUAFOOD*\n";
            msgZap += "*Cliente:* " + nome + "\n";
            msgZap += "*Pagamento:* " + pgto + "\n\n";

            for(let id in carrinho) {
                resumo += carrinho[id].qtd + "x " + carrinho[id].nome + "; ";
                msgZap += carrinho[id].qtd + "x " + carrinho[id].nome + "\n";
            }

            // Envia para a sua fila da cozinha no Termux
            await fetch('/api/pedido', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ cliente_nome: nome, itens: resumo, pagamento: pgto })
            });

            window.open("https://wa.me/5522998765432?text=" + encodeURIComponent(msgZap));
        }
    </script>
</body>
</html>

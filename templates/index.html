<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Saquá Food - Cardápio</title>
</head>
<body class="bg-gray-50 pb-32">
    <header class="bg-blue-600 p-6 text-white text-center shadow-lg mb-6">
        <h1 class="text-3xl font-bold italic">SAQUÁ FOOD 🍔</h1>
        <p class="text-sm opacity-80">O melhor de Saquarema</p>
    </header>

    <div id="cardapio" class="p-4 max-w-md mx-auto grid gap-4"></div>

    <div class="fixed bottom-0 left-0 right-0 bg-white p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.1)] border-t rounded-t-3xl">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-gray-500 text-sm">Seu Pedido:</p>
                <p id="total-carrinho" class="text-2xl font-bold text-blue-600">R$ 0,00</p>
            </div>
            <button onclick="enviarZap()" class="bg-green-500 text-white px-8 py-3 rounded-2xl font-bold shadow-lg">
                PEDIR AGORA 🚀
            </button>
        </div>
    </div>

    <script>
        let carrinho = {};

        async function carregarCardapio() {
            const res = await fetch('/api/produtos');
            const produtos = await res.json();
            const div = document.getElementById('cardapio');
            div.innerHTML = produtos.map(p => `
                <div class="bg-white rounded-3xl p-4 shadow-sm flex items-center gap-4 border">
                    <img src="${p.imagem}" class="w-16 h-16 rounded-2xl object-cover">
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800">${p.nome}</h3>
                        <p class="text-blue-600 font-bold">R$ ${p.preco.toFixed(2)}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="remover('${p.nome}')" class="bg-gray-100 px-3 py-1 rounded-lg font-bold text-gray-500">-</button>
                        <span id="qtd-${p.nome.replace(/\s+/g, '')}" class="font-bold w-4 text-center">0</span>
                        <button onclick="add('${p.nome}', ${p.preco})" class="bg-blue-100 px-3 py-1 rounded-lg font-bold text-blue-600">+</button>
                    </div>
                </div>
            `).join('');
        }

        function add(nome, preco) {
            if (!carrinho[nome]) {
                carrinho[nome] = { preco: preco, qtd: 0 };
            }
            carrinho[nome].qtd++;
            atualizarInterface(nome);
        }

        function remover(nome) {
            if (carrinho[nome] && carrinho[nome].qtd > 0) {
                carrinho[nome].qtd--;
                if (carrinho[nome].qtd === 0) delete carrinho[nome];
                atualizarInterface(nome);
            }
        }

        function atualizarInterface(nome) {
            const id = "qtd-" + nome.replace(/\s+/g, '');
            const elemento = document.getElementById(id);
            if (elemento) {
                elemento.innerText = carrinho[nome] ? carrinho[nome].qtd : 0;
            }
            
            let total = 0;
            for (let item in carrinho) {
                total += carrinho[item].preco * carrinho[item].qtd;
            }
            document.getElementById('total-carrinho').innerText = "R$ " + total.toFixed(2);
        }

        function enviarZap() {
            let itens = Object.keys(carrinho).filter(k => carrinho[k].qtd > 0);
            if (itens.length === 0) return alert("Adicione algo ao carrinho!");

            let texto = "*PEDIDO SAQUÁ FOOD*%0A%0A";
            let total = 0;
            
            itens.forEach(nome => {
                let subtotal = carrinho[nome].qtd * carrinho[nome].preco;
                texto += `✅ *${carrinho[nome].qtd}x* ${nome} - R$ ${subtotal.toFixed(2)}%0A`;
                total += subtotal;
            });

            texto += `%0A*TOTAL: R$ ${total.toFixed(2)}*%0A%0A_Favor confirmar o pedido!_`;
            
            // COLOQUE SEU ZAP ABAIXO
            const meuZap = "5521999999999"; 
            window.location.href = `https://wa.me/${meuZap}?text=${texto}`;
        }

        carregarCardapio();
    </script>
</body>
</html>

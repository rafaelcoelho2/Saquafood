<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin Saquafood</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto 20px auto; }
        h2 { color: #e50914; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        
        /* Estilo do Lançador */
        .item-venda { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-bottom: 10px; }
        .linha-topo { display: flex; justify-content: space-between; align-items: center; }
        .btn-qtd { background: #e50914; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        .btn-qtd.menos { background: #666; }
        .obs-item { width: 100%; padding: 8px; margin-top: 8px; border: 1px solid #eee; border-radius: 5px; font-size: 0.85rem; background: #fafafa; box-sizing: border-box; }
        
        /* Estilo Geral de Inputs */
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-enviar { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .resumo { background: #fff3cd; padding: 15px; border-radius: 8px; margin: 10px 0; font-weight: bold; color: #856404; border: 1px solid #ffeeba; }

        /* Estilo da Lista de Gerenciamento (O que você pediu para voltar) */
        .lista-gerenciar { margin-top: 20px; }
        .item-gerencia { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: flex-start; }
        .detalhes-lanche { flex-grow: 1; }
        .nome-lanche { font-size: 1.1rem; font-weight: bold; color: #333; }
        .preco-lanche { color: #28a745; font-weight: bold; margin-left: 10px; }
        .desc-lanche { color: #666; font-size: 0.9rem; margin-top: 4px; display: block; }
        .btn-excluir { color: #ff4444; text-decoration: none; font-weight: bold; font-size: 0.8rem; padding: 5px 10px; border: 1px solid #ff4444; border-radius: 5px; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🛒 Lançar Pedido Presencial</h2>
        <input type="text" id="mesa_v" placeholder="Nº da Mesa">
        <input type="text" id="nome_v" placeholder="Nome do Cliente">
        
        <div style="margin: 20px 0;">
            {% for p in produtos %}
            <div class="item-venda">
                <div class="linha-topo">
                    <strong>{{ p.nome }}</strong>
                    <div>
                        <button class="btn-qtd menos" onclick="alt('{{ p.nome }}', -1)">-</button>
                        <b id="q-{{ p.nome }}" style="margin: 0 10px;">0</b>
                        <button class="btn-qtd" onclick="alt('{{ p.nome }}', 1)">+</button>
                    </div>
                </div>
                <input type="text" id="obs-{{ p.nome }}" class="obs-item" placeholder="Observação para este item...">
            </div>
            {% endfor %}
        </div>

        <select id="pag_v">
            <option value="Pix">Pix</option>
            <option value="Dinheiro">Dinheiro</option>
            <option value="Cartão">Cartão</option>
        </select>

        <div class="resumo" id="res_display">Pedido: Vazio</div>

        <form action="/pedir/presencial" method="post" id="form_p">
            <input type="hidden" name="cliente" id="h_mesa">
            <input type="hidden" name="cliente_nome" id="h_nome">
            <input type="hidden" name="itens" id="h_itens">
            <input type="hidden" name="pagamento" id="h_pag">
            <button type="button" class="btn-enviar" onclick="enviar()">ENVIAR PARA COZINHA</button>
        </form>
    </div>

    <div class="card">
        <h2>🍔 Gerenciar Produtos</h2>
        <form action="/admin/salvar" method="post">
            <input name="nome" placeholder="Nome do Lanche" required>
            <input name="preco" type="number" step="0.01" placeholder="Preço (Ex: 25.00)" required>
            <input name="categoria" placeholder="Categoria (Lanches, Bebidas, etc)">
            <textarea name="descricao" placeholder="O que esse lanche leva? (Ingredientes)"></textarea>
            <input name="imagem_url" placeholder="URL da imagem (opcional)">
            <button type="submit" class="btn-enviar" style="background:#007bff">SALVAR NOVO PRODUTO</button>
        </form>

        <div class="lista-gerenciar">
            <h3>📋 Itens no Cardápio</h3>
            {% for p in produtos %}
            <div class="item-gerencia">
                <div class="detalhes-lanche">
                    <span class="nome-lanche">{{ p.nome }}</span>
                    <span class="preco-lanche">R$ {{ "%.2f"|format(p.preco) }}</span>
                    <span class="desc-lanche">{{ p.descricao if p.descricao else "Sem descrição." }}</span>
                </div>
                <a href="/admin/excluir/{{p.id}}" class="btn-excluir" onclick="return confirm('Excluir {{p.nome}}?')">Remover</a>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        let ped = {};

        function alt(nome, v) {
            if(!ped[nome]) ped[nome] = 0;
            ped[nome] += v;
            if(ped[nome] < 0) ped[nome] = 0;
            document.getElementById('q-'+nome).innerText = ped[nome];
            atualizar();
        }

        function atualizar() {
            let s = "";
            for(let k in ped) {
                if(ped[k] > 0) {
                    let obs = document.getElementById('obs-' + k).value;
                    s += ped[k] + "x " + k + (obs ? " ("+obs+")" : "") + "; ";
                }
            }
            document.getElementById('res_display').innerText = "Pedido: " + (s || "Vazio");
            document.getElementById('h_itens').value = s;
        }

        document.querySelectorAll('.obs-item').forEach(el => {
            el.addEventListener('input', atualizar);
        });

        function enviar() {
            const m = document.getElementById('mesa_v').value;
            const n = document.getElementById('nome_v').value;
            const itens = document.getElementById('h_itens').value;
            if(!m || !n || !itens) return alert("Preencha Mesa, Nome e adicione pelo menos um item!");
            
            document.getElementById('h_mesa').value = "Mesa " + m;
            document.getElementById('h_nome').value = n;
            document.getElementById('h_pag').value = document.getElementById('pag_v').value;
            document.getElementById('form_p').submit();
        }
    </script>
</body>
</html>
